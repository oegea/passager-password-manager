name: CI
'on':
  push:
    branches:
      - main
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      # Checkout the Repo
      - uses: actions/checkout@v4

      # Install pnpm 11
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      # Install Node 20 with pnpm cache
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # Install dependencies
      - run: pnpm install --frozen-lockfile

      # Run tests
      - run: pnpm test --watchAll=false
